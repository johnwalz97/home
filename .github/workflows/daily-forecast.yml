name: Daily White Mountains forecast

# Rebuilds the interactive report every morning and publishes it to GitHub Pages.
# Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: "0 10 * * *"   # 10:00 UTC ≈ 6am ET
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let a newer run supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build interactive report (stdlib only, no deps)
        working-directory: white-mountains-forecast
        env:
          WXMTN_CONTACT: "github.com/${{ github.repository }} daily build"
        run: |
          mkdir -p "$GITHUB_WORKSPACE/_site"
          python -m wxmtn --hours 36 --step 1 --html "$GITHUB_WORKSPACE/_site/index.html"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
